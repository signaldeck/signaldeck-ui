{% import 'core/group.html' as gr %}
{% extends 'core/layout.html' %}

{% block title %}
    <title>{{ title }}</title>
{% endblock %}

{% block navbar %}
    {% for p, n in paths %}
        <a href="{{ p }}">{{ n }}</a>
    {% endfor %}
{% endblock %}

{% block content %}
    {% for group in groups %}
    {{ gr.renderGroup(group)}}
    {% endfor %}
{% endblock %}
